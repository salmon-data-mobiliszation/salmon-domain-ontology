name: Ontology CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validation:
    name: Validate committed ontology artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          pip install rdflib

      - name: Run validation bundle
        run: |
          make test

  publication-surface-drift-check:
    name: Verify published docs artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Python deps
        run: |
          pip install rdflib

      - name: Install docs build tools
        run: |
          make install-robot
          make install-widoco

      - name: Refresh docs and check for drift
        run: |
          make verify-generated-artifacts
